<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="refresh" content="1800">
<title>HADR Monitor — Earthquakes</title>
<style>
:root { color-scheme: light dark; }
* { box-sizing: border-box; }
body {
  margin: 0; font: 15px/1.5 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
  background: #f6f7f9; color: #1b1f24;
}
header {
  padding: 1.5rem 2rem; background: #12233b; color: #fff;
  display: flex; align-items: baseline; gap: 1rem; flex-wrap: wrap;
}
header h1 { margin: 0; font-size: 1.4rem; }
header .edition-date { font-size: 1rem; opacity: .9; }
header .as-of { margin-left: auto; font-size: .85rem; opacity: .75; }
main { max-width: 1000px; margin: 0 auto; padding: 1.5rem 2rem; }
.board-meta { color: #566; font-size: .85rem; margin-bottom: 1rem; }
.edition-badge {
  font-size: .7rem; font-weight: 700; text-transform: uppercase; letter-spacing: .06em;
  padding: .2rem .5rem; border-radius: 999px; background: #2e7d32; color: #fff;
}
.edition-badge.badge-quiet { background: #5c6470; }
.edition-badge.badge-flash { background: #b3261e; }
.flash-banner {
  background: #b3261e; color: #fff; padding: .7rem 1rem; border-radius: 8px;
  margin: 0 0 1.2rem; font-weight: 700; letter-spacing: .01em;
}
.flash-banner:empty { display: none; }
.quiet-line { color: #445; font-size: 1.05rem; margin: 0 0 1rem; }
.quiet-line:empty { display: none; }
.edition-summary { color: #2a3340; font-size: 1rem; margin: 0 0 1.2rem; max-width: 60ch; }
.edition-summary:empty { display: none; }
.assessment { color: #2a3340; font-size: .9rem; margin: .6rem 0 0; }
.changelog:empty { display: none; }
.changelog { margin: 0 0 1.5rem; }
.changelog-title { font-size: 1rem; margin: 0 0 .6rem; color: #12233b; }
.changelog-section { margin-bottom: .8rem; }
.changelog-heading {
  font-size: .8rem; text-transform: uppercase; letter-spacing: .04em;
  margin: 0 0 .3rem; color: #566;
}
.changelog-list { margin: 0; padding-left: 1.1rem; }
.changelog-escalations .changelog-heading { color: #b3261e; }
.change-escalation { font-weight: 600; }
.hazard-filter { display: flex; gap: .4rem; flex-wrap: wrap; margin-bottom: 1rem; }
.hazard-filter:empty { display: none; }
.filter-chip {
  font: inherit; font-size: .78rem; cursor: pointer; padding: .25rem .7rem;
  border: 1px solid #c3ccd6; border-radius: 999px; background: #fff; color: #12233b;
}
.filter-chip.active { background: #12233b; color: #fff; border-color: #12233b; }
#events-board {
  display: grid; gap: 1rem;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
}
.card {
  background: #fff; border: 1px solid #dfe3e8; border-radius: 10px; padding: 1rem 1.1rem;
  box-shadow: 0 1px 2px rgba(0,0,0,.04);
}
.card-head { display: flex; align-items: center; gap: .5rem; flex-wrap: wrap; }
.hazard-tag {
  font-size: .7rem; font-weight: 700; letter-spacing: .05em; background: #12233b; color: #fff;
  padding: .15rem .4rem; border-radius: 4px;
}
.card-title { font-size: 1.05rem; margin: 0; flex: 1; }
.state-badge {
  font-size: .65rem; text-transform: uppercase; letter-spacing: .04em; padding: .15rem .4rem;
  border-radius: 4px; font-weight: 700;
}
.state-retracted { background: #b3261e; color: #fff; }
.state-aged_out { background: #8a8f98; color: #fff; }
.card.status-retracted { opacity: .7; }
.chips { display: flex; gap: .4rem; margin: .5rem 0; flex-wrap: wrap; }
.chip {
  font-size: .7rem; font-weight: 700; padding: .15rem .45rem;
  border-radius: 999px; color: #fff;
}
.chip-green { background: #1e8e3e; }
.chip-orange { background: #e8710a; }
.chip-red { background: #b3261e; }
.chip-yellow { background: #c9a900; }
.chip-null { background: #8a8f98; }
.magnitude { font-weight: 600; margin-top: .3rem; }
.place { color: #445; }
.origin-time { color: #667; font-size: .85rem; margin-top: .3rem; }
.sources { margin-top: .7rem; display: flex; gap: .5rem; flex-wrap: wrap; }
.source-link {
  font-size: .8rem; text-decoration: none; color: #12233b; border: 1px solid #c3ccd6;
  padding: .2rem .55rem; border-radius: 6px;
}
.source-link:hover { background: #eef2f6; }
.empty { color: #667; }
.coverage-banner {
  background: #8a3b00; color: #fff; padding: .6rem .9rem; border-radius: 8px;
  margin: 0 0 1rem; font-size: .9rem; font-weight: 600;
}
.coverage-banner:empty { display: none; }
.coverage { margin-top: 1.5rem; border-top: 1px solid #dfe3e8; padding-top: .8rem; }
.coverage-rows { list-style: none; margin: 0; padding: 0; font-size: .82rem; color: #566; }
.coverage-row { display: flex; gap: .6rem; align-items: baseline; padding: .15rem 0; }
.coverage-feed { font-weight: 700; min-width: 5rem; }
.coverage-state { text-transform: uppercase; letter-spacing: .04em; font-size: .7rem; }
.coverage-row.fresh .coverage-state { color: #1e8e3e; }
.coverage-row.stale .coverage-state { color: #b3261e; }
.coverage-since { color: #889; }
@media (prefers-color-scheme: dark) {
  body { background: #12151a; color: #e7ebef; }
  main { color: #e7ebef; }
  .card { background: #1b1f26; border-color: #2b313b; box-shadow: none; }
  .card-title { color: #f2f5f8; }
  .place { color: #b6bfc9; } .origin-time { color: #9aa4af; } .board-meta { color: #9aa4af; }
  .source-link { color: #cfd8e2; border-color: #39414d; }
  .source-link:hover { background: #232a33; }
  .quiet-line { color: #b6bfc9; }
  .edition-summary { color: #c8d1db; }
  .assessment { color: #c8d1db; }
  .changelog-title { color: #f2f5f8; }
  .changelog-heading { color: #9aa4af; }
  .filter-chip { background: #1b1f26; color: #cfd8e2; border-color: #39414d; }
  .filter-chip.active { background: #cfd8e2; color: #12151a; border-color: #cfd8e2; }
  .coverage { border-color: #2b313b; }
  .coverage-rows { color: #9aa4af; }
  .coverage-since { color: #79828d; }
}
</style>
</head>
<body>
<header>
  <h1 id="edition-title">HADR Monitor — Earthquakes</h1>
  <span class="edition-badge" id="edition-badge"></span>
  <span class="edition-date" id="edition-date"></span>
  <span class="as-of" id="as-of"></span>
</header>
<main>
  <p class="flash-banner" id="flash-banner"></p>
  <p class="quiet-line" id="quiet-line"></p>
  <p class="edition-summary" id="edition-summary"></p>
  <section class="changelog" id="changelog" aria-label="updates since last edition"></section>
  <p class="coverage-banner" id="coverage-banner"></p>

  <section class="coverage" aria-label="feed coverage">
    <ul class="coverage-rows" id="coverage-rows"></ul>

</main>
<script type="application/json" id="hadr-state">

<script>
const SGT_OFFSET_MIN = 8 * 60; // Singapore is UTC+8, no DST.

function toSGT(iso) {
  if (!iso) return "—";
  const utc = new Date(iso);
  if (isNaN(utc)) return iso;
  const sgt = new Date(utc.getTime() + SGT_OFFSET_MIN * 60000);
  const p = (n) => String(n).padStart(2, "0");
  return `${sgt.getUTCFullYear()}-${p(sgt.getUTCMonth() + 1)}-${p(sgt.getUTCDate())} ` +
         `${p(sgt.getUTCHours())}:${p(sgt.getUTCMinutes())} SGT`;
}

function el(tag, cls, text) {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  if (text != null) e.textContent = text;
  return e;
}

function magnitudeLabel(m) {
  if (!m || m.value == null) return "";
  const type = m.type ? ` ${m.type}` : "";
  const depth = m.depth_km != null ? ` · depth ${m.depth_km} km` : "";
  return `M ${m.value}${type}${depth}`;
}

function alertChip(kind, level) {
  const chip = el("span", `chip chip-${kind} chip-${String(level).toLowerCase()}`,
                  `${kind.toUpperCase()} ${level}`);
  return chip;
}

function sourceLinks(refs) {
  const wrap = el("div", "sources");
  const labels = { usgs: "USGS", gdacs: "GDACS", reliefweb: "ReliefWeb" };
  for (const key of Object.keys(labels)) {
    if (!refs || !refs[key]) continue;
    const a = el("a", "source-link", labels[key]);
    a.href = refs[key];
    a.target = "_blank";
    a.rel = "noopener";
    wrap.appendChild(a);
  }
  return wrap;
}

function eventCard(ev) {
  const card = el("article", `card status-${ev.status || "active"}`);
  card.dataset.hazard = ev.hazard || "";

  const head = el("div", "card-head");
  head.appendChild(el("span", "hazard-tag", ev.hazard || "?"));
  head.appendChild(el("h2", "card-title", ev.name || "(untitled event)"));
  if (ev.status && ev.status !== "active") {
    head.appendChild(el("span", `state-badge state-${ev.status}`, ev.status.replace("_", " ")));
  }
  card.appendChild(head);

  const chips = el("div", "chips");
  if (ev.gdacs_alert) chips.appendChild(alertChip("gdacs", ev.gdacs_alert));
  if (ev.pager_alert) chips.appendChild(alertChip("pager", ev.pager_alert));
  if (chips.childNodes.length) card.appendChild(chips);

  const mag = magnitudeLabel(ev.magnitude);
  if (mag) card.appendChild(el("div", "magnitude", mag));

  const loc = (ev.location && ev.location.place) || "";
  if (loc) card.appendChild(el("div", "place", loc));

  // U6: model-written assessment prose (what / where / how bad / who). Present
  // only when the guarded model step (N14) has run for a reportable event.
  if (ev.assessment) card.appendChild(el("p", "assessment", ev.assessment));

  card.appendChild(el("div", "origin-time", `Origin: ${toSGT(ev.origin_time)}`));
  card.appendChild(sourceLinks(ev.source_refs));
  return card;
}

// U8 + N20: hazard-type filter chips. Click toggles which hazards show; the
// active hazard is held in a closure and applied to every card's visibility.
const HAZARD_LABELS = { EQ: "Earthquake", TC: "Cyclone", FL: "Flood",
                        VO: "Volcano", DR: "Drought", WF: "Wildfire" };
let activeHazard = "ALL";

function applyFilter(hazard) {
  activeHazard = hazard;
  for (const card of document.querySelectorAll("#events-board .card")) {
    const show = hazard === "ALL" || card.dataset.hazard === hazard;
    card.style.display = show ? "" : "none";
  }
  for (const chip of document.querySelectorAll("#hazard-filter .filter-chip")) {
    chip.classList.toggle("active", chip.dataset.hazard === hazard);
  }
}

function renderFilterChips(events) {
  const bar = document.getElementById("hazard-filter");
  const present = [...new Set(events.map((e) => e.hazard).filter(Boolean))].sort();
  if (present.length < 2) return; // one hazard: nothing to filter between
  const mk = (hazard, text) => {
    const chip = el("button", "filter-chip", text);
    chip.dataset.hazard = hazard;
    chip.type = "button";
    chip.addEventListener("click", () => applyFilter(hazard));
    return chip;
  };
  bar.appendChild(mk("ALL", "All"));
  for (const h of present) bar.appendChild(mk(h, HAZARD_LABELS[h] || h));
  bar.querySelector('[data-hazard="ALL"]').classList.add("active");
}

function changeLine(entry) {
  const name = entry.name || entry.id;
  if (entry.kind === "escalation" || entry.kind === "downgrade") {
    return `${name}: ${entry.from} → ${entry.to}`;
  }
  if (entry.kind === "revision") {
    const mag = entry.magnitude != null ? ` (now M ${entry.magnitude})` : "";
    return `${name}: revised${mag}`;
  }
  if (entry.kind === "retraction") {
    return `${name}: retracted by source`;
  }
  return name;
}

function renderChangelog(changelog) {
  const wrap = document.getElementById("changelog");
  if (!changelog) return;
  // Order is the render order: escalations lead (US7), retractions close (US8).
  const sections = [
    ["escalations", "Escalations", changelog.escalations],
    ["downgrades", "Downgrades", changelog.downgrades],
    ["revisions", "Revisions", changelog.revisions],
    ["retractions", "Retractions", changelog.retractions],
  ];
  const built = [];
  for (const [key, heading, entries] of sections) {
    if (!entries || !entries.length) continue;
    const sec = el("div", `changelog-section changelog-${key}`);
    sec.appendChild(el("h3", "changelog-heading", heading));
    const ul = el("ul", "changelog-list");
    for (const entry of entries) {
      ul.appendChild(el("li", `change change-${entry.kind}`, changeLine(entry)));
    }
    sec.appendChild(ul);
    built.push(sec);
  }
  if (!built.length) return;
  wrap.appendChild(el("h2", "changelog-title", "Updates since last edition"));
  for (const sec of built) wrap.appendChild(sec);
}

// U12 + U13: per-feed status rows and the coverage warning banner. Times are
// UTC ISO in the island; converted to SGT here (CLAUDE.md: SGT only at render).
function renderCoverage(coverage) {
  if (!coverage) return;
  const banner = document.getElementById("coverage-banner");
  if (coverage.banner) {
    const parts = coverage.banner.items.map(
      (it) => `${it.label} unreachable since ${toSGT(it.last_success)}`
    );
    let text = parts.join("; ");
    if (coverage.banner.note) text += `; ${coverage.banner.note}`;
    banner.textContent = text;
  }
  const rows = document.getElementById("coverage-rows");
  for (const row of coverage.feeds || []) {
    const li = el("li", `coverage-row ${row.stale ? "stale" : "fresh"}`);
    li.appendChild(el("span", "coverage-feed", row.label));
    li.appendChild(el("span", "coverage-state", row.stale ? "stale" : "ok"));
    li.appendChild(el("span", "coverage-since", `last success ${toSGT(row.last_success)}`));
    rows.appendChild(li);
  }
}

function boot() {
  const state = JSON.parse(document.getElementById("hadr-state").textContent);
  const edition = state.edition || {};
  document.getElementById("edition-title").textContent = edition.title || "HADR Monitor";
  document.getElementById("edition-date").textContent = toSGT(edition.generated_at);
  document.getElementById("as-of").textContent = `as of ${toSGT(edition.generated_at)}`;

  // U1: edition type badge (regular / quiet / flash).
  const type = edition.type || "regular";
  const badge = document.getElementById("edition-badge");
  badge.textContent = type;
  badge.className = `edition-badge badge-${type}`;

  // U3: flash banner — an off-cycle Red re-render names the crossing event(s).
  if (edition.flash && edition.flash.events && edition.flash.events.length) {
    const names = edition.flash.events.map((e) => e.name || e.id).join(", ");
    document.getElementById("flash-banner").textContent =
      `FLASH — crossed into Red level: ${names}`;
  }

  // U4: quiet edition line.
  if (edition.quiet_line) {
    document.getElementById("quiet-line").textContent = edition.quiet_line;
  }

  // Edition summary paragraph (model-written, one paragraph) — reportable
  // editions only; the deterministic quiet/flash paths carry no summary.
  if (edition.summary) {
    document.getElementById("edition-summary").textContent = edition.summary;
  }

  const board = document.getElementById("events-board");
  const events = state.events || [];
  if (!events.length) {
    if (!edition.quiet_line) {
      board.appendChild(el("p", "empty", "No reportable events in the current window."));
    }
  } else {
    for (const ev of events) board.appendChild(eventCard(ev));
  }
  document.getElementById("event-count").textContent =
    `${events.length} reportable event${events.length === 1 ? "" : "s"}`;

  renderFilterChips(events);          // U8 + N20
  renderChangelog(edition.changelog); // U9 / U10 / U11
  renderCoverage(state.coverage);     // U12 / U13
}

document.addEventListener("DOMContentLoaded", boot);
</script>
</body>
